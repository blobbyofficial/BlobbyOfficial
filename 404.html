<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | BlobbyOfficial</title>
  <meta name="description" content="The page you requested could not be found.">
  <meta name="theme-color" content="#070b14">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://www.blobbyofficial.com/404.html">
  <link rel="icon" type="image/png" href="assets/icons/favicon-32x32.png">
  <link rel="stylesheet" href="assets/css/site-shell.css">
  <style>
    body { min-height: 100vh; }
    .error-main { min-height: calc(100vh - 7rem); display: grid; place-items: center; }
    .error-panel { max-width: 44rem; padding: clamp(1.3rem, 4vw, 2.4rem); text-align: center; }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(3.4rem, 15vw, 7rem);
      line-height: .88;
      letter-spacing: -.04em;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: .7rem;
    }
    .error-title { font-size: clamp(1.5rem, 4.6vw, 2.4rem); margin-bottom: .7rem; }
    .error-copy { color: var(--muted); margin: 0 auto 1.2rem; max-width: 44ch; }
    .error-actions { display: flex; gap: .72rem; justify-content: center; flex-wrap: wrap; }
    @media (max-width: 520px) { .error-actions { display: grid; } .error-actions .button { width: 100%; } }
  </style>
  <script defer src="assets/js/site-shell.js"></script>
</head>
<body class="legacy-page legacy-404">
  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="shell-header">
    <div class="shell shell-header__bar">
      <a class="shell-brand" href="/" aria-label="BlobbyOfficial home">
        <img class="shell-brand__mark" src="assets/icons/icon_1080x1080.png" alt="" width="40" height="40">
        <span class="shell-brand__copy">
          <span class="shell-brand__title">BlobbyOfficial</span>
          <span class="shell-brand__subtitle">Video editing and presets</span>
        </span>
      </a>

      <nav class="shell-nav" aria-label="Primary navigation">
        <ul class="shell-nav__list">
          <li><a class="shell-nav__link" href="/">Home</a></li>
          <li><a class="shell-nav__link" href="/#work">Work</a></li>
          <li><a class="shell-nav__link" href="/#store">Store</a></li>
          <li><a class="shell-nav__link" href="/#links">Links</a></li>
        </ul>
      </nav>

      <div class="shell-header__utilities">
        <a class="button button-secondary" href="https://store.blobbyofficial.com" target="_blank" rel="noopener noreferrer">View Presets</a>
      </div>
    </div>
  </header>

  <main id="main-content" class="shell error-main" tabindex="-1">
    <section class="surface-panel error-panel" aria-labelledby="error-title">
      <p class="error-code" aria-hidden="true">404</p>
      <h1 id="error-title" class="error-title">This page is off timeline.</h1>
      <p class="error-copy">The link is missing or moved. Jump back to the homepage, browse the editing work, or go straight to the preset store.</p>
      <div class="error-actions">
        <a class="button button-primary" href="/">Back to Home</a>
        <a class="button button-secondary" href="/#store">Open Store Section</a>
      </div>
    </section>
  </main>
</body>
</html>
